name: Validate Artifacts

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install verification tooling
        run: python -m pip install build pytest twine

      - name: Install package through supported public path
        run: python -m pip install .

      - name: Smoke installed CLI entrypoint
        run: traceloom --help

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Run unit tests
        run: pytest -q

      - name: Validate example artifacts
        run: traceloom validate examples/user-tag-bulk-import

      - name: Print MCP tool list smoke test
        run: traceloom mcp --paths examples/user-tag-bulk-import --print-tools
